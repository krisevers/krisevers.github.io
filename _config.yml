site: Kris Evers
url: krisevers.github.io
title: Kris Evers
description:
twitter:
  username: #yourusername
  card: summary
  creator: #yourusername
author:
  twitter:
  name:
  avatar:
  email: krisevers14@gmail.com
  url: krisevers.github.io
permalink: pretty

baseurl: ""

highlighter: none

exclude:
  - .jekyll-cache

compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]

sass:
  sass_dir: _sass
  style: expanded

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:year/:month/:day/:slug

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

markdown: redcarpet
redcarpet:
  extensions:
    [
      "no_intra_emphasis",
      "fenced_code_blocks",
      "highlight",
      "autolink",
      "tables",
      "strikethrough",
      "superscript",
      "with_toc_data",
    ]
  no_intra_emphasis: true
  fenced_code_blocks: true
  highlight: true
  autolink: true
  tables: true
  strikethrough: true
  superscript: true
  with_toc_data: true
  math_engine: mathjax
  mathjax:
    cdn: //cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML
